services:
  db:
    image: postgres:16-alpine
    container_name: oratio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: oratio
      POSTGRES_USER: oratio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /volume1/docker/oratio/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oratio"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: /volume1/docker/github-runner/work/Oratio
    container_name: oratio-app
    restart: unless-stopped
    env_file:
      - /volume1/docker/oratio/.env
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://oratio:${POSTGRES_PASSWORD}@db:5432/oratio
      JWT_SECRET: ${JWT_SECRET}
      SATUSEHAT_ENV: ${SATUSEHAT_ENV:-staging}
      SATUSEHAT_CLIENT_ID: ${SATUSEHAT_CLIENT_ID}
      SATUSEHAT_CLIENT_SECRET: ${SATUSEHAT_CLIENT_SECRET}
      SATUSEHAT_ORG_ID: ${SATUSEHAT_ORG_ID}
      SNOWSTORM_BASE_URL: ${SNOWSTORM_BASE_URL}
      ENABLE_CRON: 'true'
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      ORIGIN: ${ORIGIN:-http://localhost:3000}
    volumes:
      - /volume1/docker/oratio/uploads:/app/uploads
      - /volume1/docker/oratio/drizzle:/app/drizzle
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s