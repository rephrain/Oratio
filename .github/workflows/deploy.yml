name: Build & Deploy Oratio

on:
  push:
    branches:
      - main

env:
  IMAGE: ghcr.io/rephrain/oratio

jobs:
  # ── Job 1: Build arm64 image natively on an arm64 GitHub runner ───────────
  build:
    name: Build & push image
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  # ── Job 2: Pull & run on NAS ───────────────────────────────────────────────
  deploy:
    name: Deploy on NAS
    runs-on: [self-hosted, linux]
    needs: build

    steps:
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest image
        run: docker pull ${{ env.IMAGE }}:latest

      - name: Ensure data directories exist
        run: |
          mkdir -p /volume1/docker/oratio/pgdata
          mkdir -p /volume1/docker/oratio/uploads
          mkdir -p /volume1/docker/oratio/drizzle

      - name: Deploy
        run: |
          docker compose -f /volume1/docker/oratio/docker-compose.yml \
            down --remove-orphans
          docker compose -f /volume1/docker/oratio/docker-compose.yml \
            up -d

      - name: Run database migrations
        run: |
          docker exec oratio-app npx drizzle-kit migrate --config=drizzle.config.ts

      - name: Health check
        run: |
          echo "Waiting for oratio-app to become healthy..."
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' oratio-app 2>/dev/null || echo "starting")
            echo "  attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "✅ App is healthy."
              exit 0
            fi
            sleep 5
          done
          echo "⚠️  Health check timed out — dumping logs:"
          docker logs oratio-app --tail 50
          exit 1