version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: oratio
      POSTGRES_USER: oratio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oratio"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - oratio-network

  app:
    image: rephrainarchaimeric/oratio:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://oratio:${POSTGRES_PASSWORD}@db:5432/oratio
      JWT_SECRET: ${JWT_SECRET}
      SATUSEHAT_ENV: ${SATUSEHAT_ENV}
      SATUSEHAT_CLIENT_ID: ${SATUSEHAT_CLIENT_ID}
      SATUSEHAT_CLIENT_SECRET: ${SATUSEHAT_CLIENT_SECRET}
      SATUSEHAT_ORG_ID: ${SATUSEHAT_ORG_ID}
      SNOWSTORM_BASE_URL: ${SNOWSTORM_BASE_URL}
      ENABLE_CRON: 'true'
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      ORIGIN: ${ORIGIN}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - oratio-network

networks:
  oratio-network:
    driver: bridge

volumes:
  pgdata:
  uploads:
