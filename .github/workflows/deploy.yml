name: Build & Deploy Oratio

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build image and redeploy on NAS
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure data directories exist
        run: |
          mkdir -p /volume1/docker/oratio/pgdata
          mkdir -p /volume1/docker/oratio/uploads
          mkdir -p /volume1/docker/oratio/drizzle

      - name: Deploy
        run: |
          docker compose -f /volume1/docker/oratio/docker-compose.yml \
            down --remove-orphans
          docker compose \
            -f /volume1/docker/oratio/docker-compose.yml \
            --project-directory $GITHUB_WORKSPACE \
            up -d --build

      - name: Health check
        run: |
          echo "Waiting for oratio-app to become healthy..."
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' oratio-app 2>/dev/null || echo "starting")
            echo "  attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "✅ App is healthy."
              exit 0
            fi
            sleep 5
          done
          echo "⚠️  Health check timed out — dumping logs:"
          docker logs oratio-app --tail 50
          exit 1