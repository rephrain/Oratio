name: Build & Deploy Oratio

on:
  push:
    branches:
      - main   # change to 'master' if that's your default branch

jobs:
  deploy:
    name: Build image and redeploy on NAS
    runs-on: [self-hosted, linux]

    steps:
      # ── 1. Pull latest code ───────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Tag image with short commit SHA for traceability ───────────────
      - name: Set image tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # ── 3. Build the app image (postgres is a stock image, no build needed)
      - name: Build Docker image
        run: |
          docker build \
            -t oratio-app:${{ steps.vars.outputs.sha_short }} \
            -t oratio-app:latest \
            .

      # ── 4. Restart ONLY the app container — leave postgres untouched ──────
      #    This avoids any unnecessary DB downtime on every deploy.
      - name: Redeploy app container
        run: |
          docker compose -f /volume1/docker/oratio/docker-compose.yml \
            up -d --no-deps app

      # ── 5. Health check — waits up to 60s for the app to become healthy ───
      - name: Health check
        run: |
          echo "Waiting for oratio-app to become healthy..."
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' oratio-app 2>/dev/null || echo "starting")
            echo "  attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "✅ App is healthy."
              exit 0
            fi
            sleep 5
          done
          echo "⚠️  Health check timed out — dumping logs:"
          docker logs oratio-app --tail 50
          exit 1