name: Build & Deploy Oratio

on:
  push:
    branches:
      - main

env:
  IMAGE: ghcr.io/rephrain/oratio

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          no-cache: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy on NAS
    runs-on: [self-hosted, linux]
    needs: build

    steps:
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          docker login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Pull latest image
        run: |
          docker pull ${{ env.IMAGE }}:latest

      - name: Ensure persistent directories exist
        run: |
          mkdir -p /volume1/docker/oratio/pgdata
          mkdir -p /volume1/docker/oratio/uploads
          mkdir -p /volume1/docker/oratio/drizzle

      - name: Stop existing containers
        run: |
          docker compose -f /volume1/docker/oratio/docker-compose.yml down --remove-orphans

      ####################################################################
      # Start PostgreSQL only
      ####################################################################
      - name: Start PostgreSQL
        run: |
          docker compose -f /volume1/docker/oratio/docker-compose.yml up -d db

      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL..."

          for i in $(seq 1 30); do
            if docker exec oratio-db pg_isready -U oratio >/dev/null 2>&1; then
              echo "✅ PostgreSQL is ready."
              exit 0
            fi

            echo "Attempt $i/30..."
            sleep 2
          done

          echo "❌ PostgreSQL failed to start."
          docker logs oratio-db
          exit 1

      ####################################################################
      # Run Drizzle migrations
      ####################################################################
      - name: Run database migrations
        run: |
          set -e

          echo "Running Drizzle migrations..."

          docker compose \
            -f /volume1/docker/oratio/docker-compose.yml \
            run --rm app npm run db:migrate

          echo "✅ Database migrations completed."

      ####################################################################
      # Start application
      ####################################################################
      - name: Start application
        run: |
          docker compose -f /volume1/docker/oratio/docker-compose.yml up -d

      ####################################################################
      # Health Check
      ####################################################################
      - name: Wait for application
        run: |
          echo "Waiting for application..."

          for i in $(seq 1 30); do
            STATUS=$(docker inspect \
              --format='{{.State.Health.Status}}' \
              oratio-app 2>/dev/null || echo "starting")

            echo "Attempt $i/30: $STATUS"

            if [ "$STATUS" = "healthy" ]; then
              echo "✅ Application is healthy."
              exit 0
            fi

            sleep 5
          done

          echo "❌ Application failed health check."

          docker logs oratio-app --tail 200

          exit 1

      ####################################################################
      # Cleanup
      ####################################################################
      - name: Cleanup unused Docker images
        if: always()
        run: |
          docker image prune -af
          docker builder prune -af